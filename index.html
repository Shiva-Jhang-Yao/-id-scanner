<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 針對手機瀏覽器最佳化 viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手機證件掃描器</title>
    <!-- PWA 標籤 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <div id="cvLoading" class="engine-status">
        <div class="spinner"></div>
        <div id="engineStatusText">正在背景載入 AI 與影像引擎；你可以先拍照或選取照片。</div>
    </div>

    <!-- 多頁文件購物車提示 -->
    <div class="card pdf-cart is-hidden" id="pdfCart">
        <div class="row-between row-wrap gap-8">
            <h3 class="pdf-cart-title">📄 多頁文件：<span id="pdfPageCount">0</span> 頁</h3>
            <div class="pdf-cart-actions">
                <button id="btnPreviewPdfCart" class="button-compact button-info">👀 預覽</button>
                <button id="btnClearPdfCart" class="button-compact button-danger">🗑️ 清空</button>
                <button id="btnGenerateMultiPdf" class="button-compact button-primary">📥 匯出</button>
            </div>
        </div>
    </div>

    <div class="card" id="uploadCard">
        <div class="row-between upload-header">
            <h2 class="section-title">📷 1. 載入照片</h2>
        </div>
        <button class="btn-primary-cam" id="btnCamera">
            <span class="camera-icon">📸</span>
            <span class="camera-title">拍攝證件 / 文件</span>
            <span class="camera-caption">開啟相機，準備對齊邊緣</span>
        </button>
        <div class="upload-actions">
            <button class="btn-secondary" id="btnGallery">🖼️ 相簿選取</button>
            <button class="btn-secondary" id="btnPaste">📋 剪貼簿貼上</button>
        </div>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" class="is-hidden">
        <input type="file" id="galleryInput" accept="image/*" class="is-hidden">

        <div id="imagePrepStatus" class="task-status" role="status" aria-live="polite" aria-hidden="true">
            <div class="spinner"></div>
            <div class="task-status-copy">
                <strong id="imagePrepTitle" class="task-status-title">正在準備圖片</strong>
                <span id="imagePrepMessage" class="task-status-message">請稍候，正在讀取照片。</span>
                <div class="task-progress"></div>
            </div>
        </div>

        <!-- 教學動畫與步驟指引 -->
        <div class="scan-guide">
            <!-- 純 CSS 繪製的文件與掃描光條 -->
            <div class="scanner-demo">
                <div class="scanner-mark scanner-mark-1"></div>
                <div class="scanner-mark scanner-mark-2"></div>
                <div class="scanner-mark scanner-mark-3"></div>
                <div class="scanner-line"></div>
            </div>
            <h3 class="scan-title">💡 快速掃描 3 步驟</h3>
            <div class="scan-steps">
                <span>📸 1. 拍下文件</span>
                <span class="step-arrow">➔</span>
                <span>🎯 2. AI 對齊</span>
                <span class="step-arrow">➔</span>
                <span>📥 3. 匯出 PDF</span>
            </div>
        </div>
    </div>

    <div class="card is-hidden" id="editorCard">
        <div class="action-toolbar">
            <button id="btnRetake" class="button-compact button-muted">🔙 重拍</button>
            <div class="toolbar-actions">
                <button id="btnUndo" class="button-compact button-muted" title="上一步" disabled>↩️</button>
                <button id="btnRedo" class="button-compact button-muted" title="下一步" disabled>↪️</button>
                <div class="filter-hint-wrap">
                    <span id="filterActiveHint">✨ 已套用</span>
                    <button id="openFiltersBtn" class="button-compact button-info">🎛️ 濾鏡</button>
                </div>
                <button id="btnRotate" class="button-compact button-muted">🔃 旋轉</button>
            </div>
        </div>
        <div id="imageAnalysisStatus" class="task-status" role="status" aria-live="polite" aria-hidden="true">
            <div class="spinner"></div>
            <div class="task-status-copy">
                <strong id="imageAnalysisTitle" class="task-status-title">正在分析圖片</strong>
                <span id="imageAnalysisMessage" class="task-status-message">正在自動抓取文件邊界。</span>
                <div class="task-progress"></div>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        <div class="hint-text">👆 點擊角落/邊緣後，使用下方工具微調與設定</div>
        <div id="sourceImageNotice" class="source-quality-note"></div>
        <div id="qualityCheckNotice" class="source-quality-note"></div>

        <div class="editor-controls">
            <!-- 左側：十字方向鍵 -->
            <div class="nudge-grid">
                <div class="nudge-cell nudge-up"><button id="btnUp" class="btn-nudge">⬆️</button></div>
                <div class="nudge-cell nudge-left"><button id="btnLeft" class="btn-nudge">⬅️</button></div>
                <div class="nudge-cell nudge-center">
                    <select id="nudgeStep" class="compact-select">
                        <option value="1">1px</option>
                        <option value="5" selected>5px</option>
                        <option value="10">10px</option>
                        <option value="50">50px</option>
                    </select>
                </div>
                <div class="nudge-cell nudge-right"><button id="btnRight" class="btn-nudge">➡️</button></div>
                <div class="nudge-cell nudge-down"><button id="btnDown" class="btn-nudge">⬇️</button></div>
            </div>

            <!-- 右側：設定與吸附 -->
            <div class="editor-settings">
                <select id="aspectRatio" class="compact-select">
                    <option value="1.586">💳 證件 (1.586:1)</option>
                    <option value="1.414">📄 A4 (1.414:1)</option>
                    <option value="1.333">📸 4:3 照片</option>
                    <option value="1.778">📺 16:9 螢幕</option>
                    <option value="0">✂️ 自由比例</option>
                </select>
                <select id="outputResolution" class="compact-select">
                    <option value="0">🌟 目前載入畫質</option>
                    <option value="1920">📱 高畫質 1920px</option>
                    <option value="1080">💻 標準 1080px</option>
                    <option value="800">🌐 網路 800px</option>
                </select>
                <div class="snap-panel">
                    <label class="snap-toggle">
                        <input type="checkbox" id="autoSnap" checked class="snap-checkbox"> 🧲 自動吸附
                    </label>
                    <div id="snapStrengthContainer">
                        <span class="snap-strength-label">力道:<span id="snapStrengthValue">弱</span></span>
                        <input type="range" id="snapStrength" min="1" max="5" value="2">
                    </div>
                </div>
            </div>
        </div>

        <div id="loading">⏳ 處理中...</div>
        <div class="process-actions">
            <button id="resetBtn" class="button-reset">🔄 重置</button>
            <button id="processBtn" class="button-process">✂️ 裁切圖片</button>
        </div>
    </div>

    <div class="card is-hidden" id="resultCard">
        <h2>✨ 處理結果</h2>
        <div class="result-meta">
            <span id="resultResolution"></span>
            <span id="resultSize"></span>
        </div>
        <div id="resultSourceInfo" class="source-quality-note"></div>
        <div id="resultQualityInfo" class="source-quality-note"></div>
        <img id="resultImage" alt="裁切結果">
        <div class="result-actions">
            <button id="downloadJpgBtn" class="result-action button-success">⬇️ 下載 JPG</button>
            <button id="downloadPdfBtn" class="result-action button-danger">📄 下載 PDF</button>
            <button id="addToPdfBtn" class="result-action button-info">➕ 加入多頁</button>
            <button id="shareBtn" class="result-action button-primary is-hidden">📤 分享圖片</button>
            <button id="reeditBtn" class="result-action result-action-wide button-muted">🔙 重新調整</button>
        </div>
    </div>

    <!-- 懸浮控制面板 -->
    <div id="floatingControls">
        <div class="filter-header">
            <div>
                <h2 class="filter-title">🎨 調整影像</h2>
                <div class="filter-note">💡 銳化效果於裁切後生效</div>
            </div>
            <div class="filter-actions">
                <button id="resetFiltersBtn" class="button-panel">🔄 重置</button>
                <button id="closeFiltersBtn" class="button-panel button-auto">🔽 收起</button>
            </div>
        </div>
        <div class="filter-toggle-row">
            <label class="filter-toggle">
                <input type="checkbox" id="chkGrayscale"> 🌑 黑白化
            </label>
            <label class="filter-toggle" title="將圖片轉為純黑白，能有效移除陰影與背景紋理">
                <input type="checkbox" id="chkBinarize"> 📄 文件強化
            </label>
        </div>
        <div class="slider-group">
            <label>亮度</label>
            <input type="range" id="slider_b" min="0" max="200" value="100">
            <span class="val" id="val_b">100</span>
        </div>
        <div class="slider-group">
            <label>對比</label>
            <input type="range" id="slider_c" min="0" max="300" value="100">
            <span class="val" id="val_c">1.0</span>
        </div>
        <div class="slider-group">
            <label>飽和</label>
            <input type="range" id="slider_s" min="0" max="300" value="100">
            <span class="val" id="val_s">1.0</span>
        </div>
        <div class="slider-group">
            <label>降噪</label>
            <input type="range" id="slider_denoise" min="0" max="100" value="0">
            <span class="val" id="val_denoise">0.0</span>
        </div>
        <div class="slider-group">
            <label>銳化</label>
            <input type="range" id="slider_sharp" min="0" max="200" value="100">
            <span class="val" id="val_sharp">1.0</span>
        </div>
    </div>

    <!-- 多頁預覽與管理視窗 -->
    <div id="pdfPreviewModal" class="modal-backdrop">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 class="modal-title">📄 預覽多頁文件</h2>
                <button id="btnClosePreview" class="button-panel button-auto">✖ 關閉</button>
            </div>
            <!-- 預覽縮圖網格 -->
            <div id="pdfPreviewGallery" class="preview-gallery">
            </div>
            <!-- 空狀態提示 -->
            <div id="pdfPreviewEmpty" class="modal-empty">
                目前沒有掃描任何文件喔！
            </div>
        </div>
    </div>

    <!-- 供 OpenCV.js 進行背景運算的隱藏畫布 -->
    <canvas id="offscreenCanvas" class="offscreen-canvas"></canvas>

    <!-- 版本號顯示 -->
    <div class="version-badge">
        v2.1.2
    </div>
    <script type="module" src="./js/app.js"></script>

    <!-- 引入外部套件 (移至底部以解決 Service Worker 快取導致的載入順序問題) -->
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
</body>
</html>
